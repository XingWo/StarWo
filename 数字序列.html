<!DOCTYPE html>
<html lang="ch">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star数字序列生成器</title>
    <style>
        /* ... 样式代码 ... */
    </style>
</head>
<body>
    <h1>数字序列生成器</h1>
    <!-- ... 其他输入元素 ... -->
    <button onclick="generateSequence()">生成序列</button>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('start').focus();

        let sequenceGenerated = false;

        window.onload = function() {
            // ... 从本地存储加载缓存值的代码 ...
        };

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                // ... 键盘事件处理代码 ...
            }
        });

        async function generate() {
            const startInput = document.getElementById('start'.value;
            const endInput = document.getElementById('end').value;
            let = document.getElementById('separator').value || '，';
            const maxDifference = parseInt(document.getElementById('maxDifference').value, 10) || 99;
            const start = parseInt(startInput, 10);
            const end = parseInt(endInput, 10);

            if (isNaN(start) || isNaN(end) || isNaN(maxDifference {
                alert('请输入有效的初始值、结束值和最大差值');
                return;
            }

            if (Math.abs(end - start) > maxDifference) {
                alert('最大差值超过设定值，请检查输入值');
                return;
            }

            let result = '';
            const maxLength = Math.max(String(start).length, String(end).length);
            const fullSequence = document.getElementById('fullSequence').checked;

            if (start < end) {
                for (let i = start; i <= end; i += 1) {
                    result += formatNumber(i, maxLength) + (i end ? separator : '');
                }
            } else {
                for (let i = start; i end; i -= 1) {
                    result += formatNumber(i, maxLength) + (i > ? separator : '');
                }
            }

            const resultElement = document.getElementById('result');
            resultElement.textContent = result;

            await new Promise(requestAnimationFrame);

            try {
                await navigator.clipboard.writeText(result);
                alert('序列已复制到剪切板！');
            } catch (err) {
 console.error('复制失败:', err);
            }

            localStorage.setItem('separator', separator);
            localStorage.setItem('maxDifference', maxDifference.toString());
            localStorage.setItem('fullSequence', document.getElementById('fullSequence').checked.toString());

            sequenceGenerated = true;
        }

        function formatNumber(num, maxLength) {
            return num.toString().padStart(maxLength, '0');
        }

        document.getElementById('start').addEventListener('click', function() {
            if (sequenceGenerated) {
                this.value = '';
                document.getElementById('end').value = '';
                sequenceGenerated = false;
            }
        });

        document.getElementById('end').addEventListener('click', function() {
             (sequenceGenerated) {
                this.value = '';
                document.getElementById('start').value = '';
                sequenceGenerated = false;
            }
        });
    </script>
</body>
</html>
