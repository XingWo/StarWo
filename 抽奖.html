<!DOCTYPE html>
<html lang="ch">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>star抽奖姬</title>
<style>
  body {
    display: flex;
    font-family: Arial, sans-serif;
  }
  #draw-container {
    flex: 70%;
  }
  #record-container {
    flex: 30%;
    margin-left: 20px;
    padding: 10px;
    border: 1px solid #ccc;
    height: 500px;
    overflow-y: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: left;
  }
  th {
    background-color: #f2f2f2;
  }
  .draw-item {
    margin-bottom: 10px;
  }
  input[type="number"] {
    width: 50px;
  }
  .strikethrough {
    text-decoration: line-through;
    color: red; /* 设置字体颜色为红色 */
  }
</style>
</head>
<body>

<div id="draw-container">
  <h3>抽奖项配置</h3>
  
  <div class="draw-item">
    <input type="text" id="name" placeholder="获奖人/奖项">
    <input type="number" id="weight" placeholder="权重" value="1">
    <button onclick="addDrawItem()">添加新的抽奖项</button>
  </div>
  
  <div>
    <label>
      <input type="checkbox" id="allow-repeat" checked>
      允许重复抽奖
    </label>
  </div>
  
  <div>
    <label>
      <input type="checkbox" id="auto-export" onchange="toggleAutoExport()">
      自动导出抽奖记录
    </label>
  </div>
  
  <div>
    <label>
      <input type="checkbox" id="shuffle-toggle" checked>
      抽奖前洗牌
    </label>
  </div>

  <button id="export-record-btn" onclick="exportDrawRecord()">导出抽奖记录</button>
  <button onclick="startDraw()">开始抽奖</button>
  <button onclick="exportConfig()">导出配置</button>
  <input type="file" id="import-config" accept=".json" onchange="importConfig(event)" style="display: none;">
  <button onclick="document.getElementById('import-config').click()">导入配置</button>
  
  <table id="draw-items-table">
    <thead>
      <tr>
        <th>获奖人/奖项</th>
        <th>权重</th>
        <th>备注</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="draw-items"></tbody>
  </table>
</div>

<div id="record-container">
  <h3>抽奖记录</h3>
  <ul id="draw-record"></ul>
</div>

<script>
let drawItems = [];
let drawnItems = [];
let drawResults = [];

function addDrawItem() {
  const name = document.getElementById('name').value;
  const weight = parseInt(document.getElementById('weight').value, 10);
  if (name && !isNaN(weight) && weight > 0) {
    drawItems.push({ name, weight });
	
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${name}</td>
      <td>${weight}</td>
      <td></td>
      <td>
        <button onclick="editDrawItem(this)">编辑</button>
        <button onclick="removeDrawItem(this)">删除</button>
      </td>
    `;
    document.getElementById('draw-items').appendChild(row);
    document.getElementById('name').value = '';
    document.getElementById('weight').value = '1';
  } else {
    alert('请输入有效内容');
  }
}

function removeDrawItem(button) {
  const row = button.parentNode.parentNode;
  const index = Array.from(document.getElementById('draw-items').children).indexOf(row);
  drawItems.splice(index, 1);
  row.remove();
}

function resetStyles() {
  const rows = document.getElementById('draw-items').children;
  for (let j = 0; j < rows.length; j++) {
    rows[j].children[0].classList.remove('strikethrough');
    rows[j].children[0].style.color = ''; // 重置字体颜色
  }
}

function startDraw() {
  const record = document.getElementById('draw-record');
  
  // 重置样式
  if (document.getElementById('allow-repeat').checked) {
    resetStyles();
    drawnItems = []; // 清空已抽中的项
  }

  // 生成权重索引数组
  const indices = [];
  
  // 创建权重索引数组
  drawItems.forEach((item, index) => {
    if (document.getElementById('allow-repeat').checked || !drawnItems.includes(item.name)) {
      for (let i = 0; i < item.weight; i++) {
        indices.push(index); // 将每个奖项的索引添加到数组中
      }
    }
  });

  // 检查是否还有可抽奖项
  if (indices.length === 0) {
    alert('所有奖项均已抽中！');
    return;
  }

  // 检查洗牌开关状态
  if (document.getElementById('shuffle-toggle').checked) {
    // 随机打乱索引数组
    shuffleArray(indices);
  }

  // 生成一个随机数
  const randomIndex = Math.floor(Math.random() * indices.length);
  const selectedIndex = indices[randomIndex]; // 根据随机数选择索引
  // 获取对应的奖项
  const selectedItem = drawItems[selectedIndex];

  // 添加到抽奖记录
  const drawTime = new Date().toLocaleString();
  const newRecordItem = `<li style="color: gold;">${selectedItem.name} 被抽中！</li>`;
  record.innerHTML = newRecordItem + record.innerHTML; // 将新记录添加到最上面
  drawResults.push({ name: selectedItem.name, time: drawTime , randomValue: randomIndex ,  arrays: indices});

  // 自动导出抽奖记录
  if (document.getElementById('auto-export').checked) {
    exportDrawRecord();
  }

  // 在表格中添加删除线和红色字体
  const rows = document.getElementById('draw-items').children;
  for (let j = 0; j < rows.length; j++) {
    if (rows[j].children[0].innerText === selectedItem.name) {
      if (document.getElementById('allow-repeat').checked) {
        rows[j].children[0].style.color = 'gold'; // 设置字体颜色为金色
      } else {
        // 标记为已抽中
        drawnItems.push(selectedItem.name);
        rows[j].children[0].classList.add('strikethrough'); // 添加删除线
        rows[j].children[0].style.color = 'red'; // 设置字体颜色为红色
      }
      break;
    }
  }

  // 恢复历史记录颜色为黑色
  const historyItems = record.getElementsByTagName('li');
  for (let k = 1; k < historyItems.length; k++) { // 从1开始，跳过最新的记录
    historyItems[k].style.color = 'black';
  }
}


// 随机打乱数组的函数
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]]; // 交换元素
  }
}


function exportDrawRecord() {
  // 添加表格头
  const header = "中奖人/项,中奖时间,打乱顺序,中奖值\n"; // 添加打乱顺序的列头
  const csvContent = "data:text/csv;charset=utf-8,\uFEFF" 
    + header // 添加表头
    + drawResults.map(e => `${e.name},${e.time},${e.arrays.join(';')},${e.randomValue}`).join("\n"); // 添加打乱顺序

  const encodedUri = encodeURI(csvContent);
  const link = document.createElement("a");
  link.setAttribute("href", encodedUri);
  link.setAttribute("download", `${new Date().toISOString().slice(0, 19).replace(/T/g, '_')}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}


function exportConfig() {
  const jsonContent = JSON.stringify(drawItems, null, 2);
  const blob = new Blob([jsonContent], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "config.json";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function importConfig(event) {
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const content = e.target.result;
      try {
        const importedItems = JSON.parse(content);
        drawItems = importedItems;
        const drawItemsTable = document.getElementById('draw-items');
        drawItemsTable.innerHTML = ''; // 清空当前表格
        importedItems.forEach(item => {
		  const remark = item.remark || ''; // 如果没有remark，使用空字符串
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.weight}</td>
			<td>${remark}</td>
            <td>
              <button onclick="editDrawItem(this)">编辑</button>
              <button onclick="removeDrawItem(this)">删除</button>
            </td>
          `;
          drawItemsTable.appendChild(row);
        });
      } catch (error) {
        alert('导入失败，请确保文件格式正确。');
      }
    };
    reader.readAsText(file);
  }
}

function toggleAutoExport() {
  const autoExportChecked = document.getElementById('auto-export').checked;
  document.getElementById('export-record-btn').style.display = autoExportChecked ? 'none' : 'inline-block';
}


</script>

</body>
</html>
