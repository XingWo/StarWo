<!DOCTYPE html>
<html lang="ch">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>star抽奖姬</title>
<style>
  body {
    display: flex;
    font-family: Arial, sans-serif;
  }
  #draw-container {
    flex: 70%;
  }
  #record-container {
    flex: 30%;
    margin-left: 20px;
    padding: 10px;
    border: 1px solid #ccc;
    height: 500px;
    overflow-y: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: left;
  }
  th {
    background-color: #f2f2f2;
  }
  .draw-item {
    margin-bottom: 10px;
  }
  input[type="number"] {
    width: 50px;
  }
  .strikethrough {
    text-decoration: line-through;
    color: red; /* 设置字体颜色为红色 */
  }
</style>
</head>
<body>

<div id="draw-container">
  <h3>抽奖项配置</h3>
  
  <div class="draw-item">
    <input type="text" id="name" placeholder="获奖人/奖项">
    <input type="number" id="weight" placeholder="权重" value="1">
    <button onclick="addDrawItem()">添加新的抽奖项</button>
  </div>
  
  <div>
    <label>
      <input type="checkbox" id="allow-repeat" checked>
      允许重复抽奖
    </label>
  </div>
  
  <button onclick="startDraw()">开始抽奖</button>
  <table id="draw-items-table">
    <thead>
      <tr>
        <th>获奖人/奖项</th>
        <th>权重</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="draw-items"></tbody>
  </table>
</div>

<div id="record-container">
  <h3>抽奖记录</h3>
  <ul id="draw-record"></ul>
</div>

<script>
let drawItems = [];
let drawnItems = [];

function addDrawItem() {
  const name = document.getElementById('name').value;
  const weight = parseInt(document.getElementById('weight').value, 10);
  if (name && !isNaN(weight) && weight > 0) {
    drawItems.push({ name, weight });
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${name}</td>
      <td>${weight}</td>
      <td><button onclick="removeDrawItem(this)">删除</button></td>
    `;
    document.getElementById('draw-items').appendChild(row);
    document.getElementById('name').value = '';
    document.getElementById('weight').value = '1';
  } else {
    alert('请输入有效内容');
  }
}

function removeDrawItem(button) {
  const row = button.parentNode.parentNode;
  const index = Array.from(document.getElementById('draw-items').children).indexOf(row);
  drawItems.splice(index, 1);
  row.remove();
}

function resetStyles() {
  const rows = document.getElementById('draw-items').children;
  for (let j = 0; j < rows.length; j++) {
    rows[j].children[0].classList.remove('strikethrough');
  }
}

function startDraw() {
  const record = document.getElementById('draw-record');
  
  // 重置样式
  if (document.getElementById('allow-repeat').checked) {
    resetStyles();
    drawnItems = []; // 清空已抽中的项
  }

  let totalWeight = drawItems.reduce((acc, item) => acc + item.weight, 0);
  let random = Math.random() * totalWeight | 0;

  for (let i = 0; i < drawItems.length; i++) {
    if (random < drawItems[i].weight) {
      if (!document.getElementById('allow-repeat').checked && drawnItems.includes(drawItems[i].name)) {
        // 如果不允许重复抽奖且已经抽中过该项，则跳过
        continue;
      }
      
      // 添加到抽奖记录
      record.innerHTML += `<li>${drawItems[i].name} 被抽中！</li>`;
      
      // 如果不允许重复抽奖，标记为已抽中
      if (!document.getElementById('allow-repeat').checked) {
        drawnItems.push(drawItems[i].name);
        // 在表格中添加删除线和红色字体
        const rows = document.getElementById('draw-items').children;
        for (let j = 0; j < rows.length; j++) {
          if (rows[j].children[0].innerText === drawItems[i].name) {
            rows[j].children[0].classList.add('strikethrough');
            break;
          }
        }
      }
      break;
    }
    random -= drawItems[i].weight;
  }
}

</script>

</body>
</html>
